version: '3.8'

services:
  contentstudio-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contentstudio-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./storage/media:/app/storage/media
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for caching and distributed task queuing
  # Uncomment to enable Redis support
  # redis:
  #   image: redis:7-alpine
  #   container_name: contentstudio-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  redis-data:
